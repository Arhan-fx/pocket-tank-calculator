<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Tank Angle Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Tank Angle Calculator</h1>

    <div class="form-group">
      <label for="d">Distance (d)</label>
      <input type="number" id="d" step="any" placeholder="Enter distance">
    </div>

    <div class="form-group">
      <label for="y">Vertical Separation (y)</label>
      <input type="number" id="y" step="any" placeholder="Enter vertical separation">
    </div>

    <div class="form-group">
      <label for="p">Power (p)</label>
      <input type="number" id="p" step="any" placeholder="Enter power">
    </div>

    <div class="form-group">
      <label for="altitude">Target Altitude</label>
      <select id="altitude">
        <option value="higher">Higher</option>
        <option value="lower">Lower</option>
      </select>
    </div>

    <div class="form-group">
      <label for="side">Target Side</label>
      <select id="side">
        <option value="left">Left</option>
        <option value="right">Right</option>
      </select>
    </div>

    <button onclick="calculateAngle()">Calculate</button>

    <div id="result" class="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
